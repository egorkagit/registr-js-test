<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
   <link rel="stylesheet" href="css/style.css">
</head>

<body>
   <p id="errorMsg" style="color:red; display:none;"></p>
   <div class="wrapper">
      <div class="container">
         <div class="logo text-uppercase"><img src="img/17af2269-15e4-4afa-aa16-0dc658bba525.png" alt="">Company</div>
      </div>
      <div class="wrapper__acc">
         <div class="container">
            <h1>Account</h1>
            <span>Get started</span>
            <form class="d-flex flex-column" enctype="multipart/form-data" method="post" action="">
               <span class="text-danger" id="error">Не верный логин или пароль!</span>
               <input id="useradd" placeholder="Email Adress" type="email">
               <input id="useraddpass" placeholder="Password" type="password">
               <button class="confirmbtn" id="but__conf">Confirm</button>
            </form>
            <span class="d-flex justify-content-center">or</span>

            <button id="but__reg">Register</button>
         </div>
      </div>
      <div class="wrapper__reg">
         <div class="container">
            <h1>Create Account</h1>
            <span>Join us and get started</span>
            <form id="myForm" class="d-flex flex-column" enctype="multipart/form-data" method="post" action="">
               <input name="name" placeholder="User name" id="user" type="text">
               <input name="email" placeholder="Email Adress" id="email" type="email">
               <input name="password" placeholder="Password" id="password" type="password">
               <input name="confpass" placeholder="Confirm Password" id="confpassword" type="password">
               <button type="submit" class="confirmbtn" id="but__conf3">Confirm</button>
            </form>
            <span class="d-flex justify-content-center">or</span>

            <button id="have__acc">I have Account</button>
         </div>
      </div>
   </div>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
   <script src="js/script.js"></script>
</body>

</html>
